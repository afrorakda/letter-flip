<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Letter Flip</title>
    
    <link rel="icon" href="image_11.png">
    <link rel="apple-touch-icon" href="image_11.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; color: #111; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 380px; min-height: 95vh; display: flex; flex-direction: column; }
        h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.8px; margin: 25px 0 5px; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 35px; }
        
        .input-box { width: 100%; height: 180px; padding: 18px; border: 1px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; -webkit-appearance: none; resize: none; margin-bottom: 20px; line-height: 1.5; }
        .input-box:focus { border-color: #111; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .btn-action { padding: 15px 5px; background-color: #111; color: white; border: none; border-radius: 15px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: 0.2s; -webkit-appearance: none; }
        .btn-clear { width: 100%; padding: 15px; background-color: #f0f0f0; color: #666; border: none; border-radius: 15px; font-size: 0.9rem; font-weight: 700; cursor: pointer; margin-bottom: 30px; -webkit-appearance: none; }
        
        .btn-action:active, .btn-clear:active { transform: scale(0.96); opacity: 0.8; }
        
        /* Fridge Combo Standard Footer */
        footer { margin-top: auto; padding: 40px 0 20px; text-align: center; font-size: 13px; color: #666; border-top: 1px solid #f0f0f0; }
        .kofi-btn { display: inline-block; background: #111; color: #fff; padding: 12px 24px; border-radius: 15px; text-decoration: none; font-weight: bold; margin-bottom: 20px; transition: 0.2s; }
        .install-btn { background: #f0f0f0; color: #111; border: none; padding: 8px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 500; margin-bottom: 20px; }
        .footer-line { line-height: 1.8; color: #999; }
        .footer-link { color: #999; text-decoration: underline; }
        
        #install-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 85%; max-width: 300px; position: relative; text-align: center; }
        .btn-close-modal { position: absolute; top: 15px; right: 15px; background:none; border:none; font-size:20px; color: #999; cursor: pointer; }
        
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.8rem; display: none; z-index: 100; }
    </style>
</head>
<body>
<div class="container">
    <h1>Letter Flip</h1>
    <p class="subtitle">Quickly flip text case. Auto-copied.</p>
    
    <textarea id="txt" class="input-box" placeholder="Type or paste your text..."></textarea>
    
    <div class="btn-grid">
        <button class="btn-action" onclick="flip('up')">UPPER</button>
        <button class="btn-action" onclick="flip('low')">lower</button>
        <button class="btn-action" onclick="flip('title')">Title Case</button>
    </div>
    <button class="btn-clear" onclick="clearAll()">Clear All</button>
    
    <footer>
        <a href="https://ko-fi.com/afrorakda" target="_blank" rel="noopener" class="kofi-btn">☕ Support me on Ko-fi</a>
        <div>
            <button class="install-btn" onclick="showInstall()">Add to Home Screen</button>
        </div>
        <div class="footer-line">
            <div>No login / No tracking / No ads / Browser only</div>
            <div><a href="privacy.html" class="footer-link">Privacy Policy</a></div>
            <div style="margin-top: 10px; font-weight: bold; color: #111;">Letter Flip © 2026</div>
        </div>
    </footer>
</div>

<div id="install-modal" onclick="hideInstall()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="btn-close-modal" onclick="hideInstall()">✕</button>
        <h2 style="font-size: 1.2rem; margin-top:0;">📱 Install</h2>
        <p style="font-size: 0.85rem; color: #555;">Add to your home screen.</p>
        <div style="text-align: left; font-size: 0.8rem; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top:15px;">
            <strong>🍏 iOS:</strong> Share > Add to Home Screen<br>
            <strong>🤖 Android:</strong> Menu > Add to Home screen
        </div>
    </div>
</div>

<div id="toast">Copied!</div>

<script>
    function flip(mode) {
        const area = document.getElementById('txt');
        let str = area.value;
        if (!str) return;

        if (mode === 'up') str = str.toUpperCase();
        if (mode === 'low') str = str.toLowerCase();
        if (mode === 'title') {
            str = str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        area.value = str;
        copy(str);
    }

    function clearAll() {
        const area = document.getElementById('txt');
        area.value = '';
        area.focus();
    }

    async function copy(t) {
        try {
            await navigator.clipboard.writeText(t);
            const s = document.getElementById('toast');
            s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 1500);
        } catch(e) {}
    }

    function showInstall() { document.getElementById('install-modal').style.display = 'flex'; }
    function hideInstall() { document.getElementById('install-modal').style.display = 'none'; }
</script>
</body>
</html>
